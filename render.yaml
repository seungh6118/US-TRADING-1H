services:
  - type: web
    name: us-stock-ai-research
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: HOSTNAME
        value: 0.0.0.0
      - key: APP_DATA_MODE
        value: mock
      - key: APP_STRICT_LIVE_MODE
        value: "true"
      - key: APP_DEFAULT_UNIVERSE
        value: sp500
      - key: APP_TIMEZONE
        value: Asia/Seoul
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: FMP_BASE_URL
        value: https://financialmodelingprep.com/stable
